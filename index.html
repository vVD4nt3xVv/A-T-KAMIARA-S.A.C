<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A&T KAMIARA</title>

<style>
body {background:#0b0b0b;color:white;font-family:Arial;margin:0;max-width:500px;margin:auto;}

/* LOGIN */
#pantallaLogin {
  display:flex;flex-direction:column;justify-content:center;
  align-items:center;height:100vh;text-align:center;
  background:#0b0b0b;
}

input {
  margin-top:10px;padding:10px;width:80%;
  border-radius:10px;border:none;
}

button {
  width:80%;margin-top:10px;padding:10px;
  border:none;border-radius:10px;background:red;color:white;
}

/* BARRA */
#barraUsuario {
  display:none;background:#111;padding:10px;text-align:center;
}

.rol {color:#00aaff;}
.user {color:#00ff88;}

/* MENU */
#menu {display:flex;flex-wrap:wrap;justify-content:center;}
.menu-card {
  width:40%;margin:10px;padding:15px;border-radius:15px;
  background:#111;text-align:center;
}

/* PRODUCTOS */
#productos {display:none;flex-wrap:wrap;justify-content:center;}

.card {
  width:45%;margin:10px;padding:10px;border-radius:15px;background:#111;
  text-align:center;
}
.card img {width:100%;border-radius:10px;}

#volver {display:none;text-align:center;padding:10px;background:#222;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="pantallaLogin">
  <h1>A&T KAMIARA S.A.C</h1>
  <p style="color:gray;">Sistema de Inventario</p>

  <input id="usuario" placeholder="Usuario">
  <input id="password" type="password" placeholder="Contraseña">

  <button onclick="iniciarSesion()">Entrar</button>
  <p id="errorLogin" style="color:red;"></p>
</div>

<!-- BARRA -->
<div id="barraUsuario">
  <span id="infoUser"></span>
  <button onclick="logout()" style="background:red;">Salir</button>
</div>

<!-- MENU -->
<div id="menu">
  <div class="menu-card" onclick="abrir('INVIERNO')">❄️ INVIERNO</div>
  <div class="menu-card" onclick="abrir('VERANO')">☀️ VERANO</div>
</div>

<div id="volver" onclick="inicio()">⬅ Volver</div>

<!-- PRODUCTOS -->
<div id="productos"></div>

<script>

// USUARIOS
const usuarios = {
  "luis": { pass: "1234", rol: "GERENTE" },
  "juan": { pass: "1234", rol: "VENDEDOR" },
  "katy": { pass: "1234", rol: "VENDEDORA" },
  "richar": { pass: "admin123", rol: "PROGRAMADOR" }
};

// DATA
const urlInv = "https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/INVENTARIO";

let inventario = [];

// LOGIN
function iniciarSesion(){
  const u = document.getElementById("usuario").value.toLowerCase();
  const p = document.getElementById("password").value;

  if(usuarios[u] && usuarios[u].pass === p){
    localStorage.setItem("usuario", u);
    localStorage.setItem("rol", usuarios[u].rol);
    location.reload();
  } else {
    document.getElementById("errorLogin").innerText="Datos incorrectos";
  }
}

// AUTO LOGIN
window.onload = ()=>{
  const u = localStorage.getItem("usuario");
  const r = localStorage.getItem("rol");

  if(u && r){
    document.getElementById("pantallaLogin").style.display="none";
    document.getElementById("barraUsuario").style.display="block";

    document.getElementById("infoUser").innerHTML =
      `<span class="rol">${r}</span> : <span class="user">${u.toUpperCase()}</span>`;
  } else {
    document.getElementById("menu").style.display="none";
  }

  cargarInventario();
};

// LOGOUT
function logout(){
  localStorage.clear();
  location.reload();
}

// INVENTARIO
function cargarInventario(){
  fetch(urlInv)
  .then(r=>r.json())
  .then(d=> inventario = d);
}

// CATEGORIA
function abrir(cat){
  document.getElementById("menu").style.display="none";
  document.getElementById("productos").style.display="flex";
  document.getElementById("volver").style.display="block";

  let lista = inventario.filter(p=>p.categoria===cat);

  let html="";
  lista.forEach(p=>{
    html+=`
      <div class="card">
        <img src="${p.imagen}">
        <h3>${p.producto}</h3>
        <p>Stock: ${p.stock}</p>
        <button onclick="vender('${p.producto}')">Vender</button>
      </div>
    `;
  });

  document.getElementById("productos").innerHTML=html;
}

// VOLVER
function inicio(){
  document.getElementById("menu").style.display="flex";
  document.getElementById("productos").style.display="none";
  document.getElementById("volver").style.display="none";
}

// VENDER
function vender(prod){
  alert("Venta: " + prod);
}

</script>

</body>
</html>

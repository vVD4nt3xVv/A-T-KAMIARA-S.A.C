<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&T KAMIARA</title>

<style>
body {
  background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
  color:white;
  font-family:Arial;
  margin:0;
  max-width:480px;
  margin:auto;
}

/* LOGIN */
#login {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.login-box {
  background:#111;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:320px;
  text-align:center;
}

.login-box input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

.login-box button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
}

/* HEADER */
#userInfo {text-align:center;margin-top:10px;}

.top-buttons {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}

.btn-salir {
  background:red;
  padding:6px 15px;
  font-size:12px;
  border-radius:8px;
}

.btn-admin {
  background:#007bff;
  padding:6px 15px;
  font-size:12px;
  border-radius:8px;
}

/* PORTADA */
#portada img {width:100%;height:200px;object-fit:cover;}
.titulo {text-align:center;font-size:22px;}
.sub {text-align:center;color:gray;}

/* MENU */
.grid-menu {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.menu-card {
  background:#111;
  border-radius:15px;
  overflow:hidden;
  text-align:center;
  cursor:pointer;
}

.menu-card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

/* PRODUCTOS */
#productos {
  display:none;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#111;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

/* SLIDER */
.slider {
  display:flex;
  overflow-x:auto;
  gap:10px;
}

.slider img {
  width:85%;
  border-radius:15px;
}

/* TABLA MEJORADA */
table {
  width:100%;
  margin-top:15px;
  border-collapse:separate;
  border-spacing:0 8px;
}

th {
  padding:10px;
  text-align:center;
  color:#00ffaa;
}

td {
  padding:12px;
  text-align:center;
  background:#1a1a1a;
  border-radius:8px;
}

tr:hover td {
  background:#222;
}

/* BOTONES */
button {
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
}

.btn-small {
  width:auto;
  padding:8px 15px;
}

/* PANEL */
#panel {display:none;padding:20px;}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h3>Bienvenido</h3>
    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="guardarUsuario()">Entrar</button>
    <p id="errorLogin"></p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="userInfo"></div>

<div class="top-buttons">
  <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  <button class="btn-admin" id="panelBtn" onclick="abrirPanel()" style="display:none;">Panel</button>
</div>

<div id="portada">
  <img src="https://lh3.googleusercontent.com/d/1iSusezseDbUbs0jztHYHmSaX6kyzUKLG">
  <div class="titulo">CONTROL DE INVENTARIO</div>
  <div class="sub">A&T KAMIARA</div>
</div>

<!-- MENU COMPLETO -->
<div id="menu" class="grid-menu">
  <div class="menu-card" onclick="abrir('INVIERNO')"><img src="https://i.imgur.com/0rZ9F9G.jpg"><p>INVIERNO</p></div>
  <div class="menu-card" onclick="abrir('VERANO')"><img src="https://i.imgur.com/qIufhof.jpg"><p>VERANO</p></div>
  <div class="menu-card" onclick="abrir('TECNOLOGIA')"><img src="https://i.imgur.com/2DhmtJ4.jpg"><p>TECNOLOGÍA</p></div>
  <div class="menu-card" onclick="abrir('OTONO')"><img src="https://i.imgur.com/Y7mT4bT.jpg"><p>OTOÑO</p></div>
  <div class="menu-card" onclick="abrir('NAVIDAD')"><img src="https://i.imgur.com/YT6XGkZ.jpg"><p>NAVIDAD</p></div>
  <div class="menu-card" onclick="abrir('JUGUETES')"><img src="https://i.imgur.com/d2P6PqH.jpg"><p>JUGUETES</p></div>
</div>

<div id="productos"></div>

<!-- PANEL -->
<div id="panel">
  <h2>Panel Admin</h2>
  <button onclick="abrirFormulario()">➕ Agregar Producto</button>
  <button onclick="verVentas()">📊 Ver Ventas</button>
  <button onclick="inicio()">⬅ Volver</button>
</div>

</div>

<script>

// USUARIOS
const usuariosSistema = {
  luis:"123", katy:"123", katherine:"123",
  richard:"123", dante:"admin123"
};
const admins = ["dante"];

// LOGIN
function guardarUsuario(){
  const user = usuario.value.toLowerCase().trim();
  const pass = password.value;

  if(!usuariosSistema[user]) return errorLogin.innerText="Usuario no registrado";
  if(usuariosSistema[user]!==pass) return errorLogin.innerText="Contraseña incorrecta";

  localStorage.setItem("usuario",user);
  location.reload();
}

function cerrarSesion(){
  localStorage.removeItem("usuario");
  location.reload();
}

// UI
window.onload=()=>{
  const user=localStorage.getItem("usuario");

  login.style.display = user ? "none":"flex";
  app.style.display = user ? "block":"none";

  if(user){
    if(admins.includes(user)) panelBtn.style.display="inline-block";
  }
};

// INVENTARIO
let inventario=[];

fetch("https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/INVENTARIO")
.then(r=>r.json())
.then(d=>inventario=d);

// MENU
function abrir(cat){
  menu.style.display="none";
  productos.style.display="grid";

  const filtrados = inventario.filter(p=>p.categoria==cat && p.stock>0);

  const unicos={};
  filtrados.forEach(p=>{ if(!unicos[p.id]) unicos[p.id]=p });

  let html="";
  Object.values(unicos).forEach(p=>{
    html+=`
      <div class="card" onclick="verProducto('${p.id}','${cat}')">
        <img src="${p.imagen}">
        <h3>${p.producto}</h3>
        <p>S/ ${p["p.unidad"]}</p>
      </div>
    `;
  });

  html+=`<button class="btn-small" onclick="inicio()">⬅ Volver</button>`;
  productos.innerHTML=html;
}

function inicio(){
  menu.style.display="grid";
  productos.style.display="none";
  panel.style.display="none";
}

// DETALLE
function verProducto(id,cat){

  const variantes = inventario.filter(p=>p.id==id && p.stock>0);
  const p = variantes[0];

  let total=0;
  variantes.forEach(v=> total+=Number(v.stock));

  const tallas=[...new Set(variantes.map(v=>v.talla))];

  productos.innerHTML=`
  <div>

    <div class="slider">
      ${variantes.slice(0,3).map(v=>`<img src="${v.imagen}">`).join("")}
    </div>

    <h2>${p.producto}</h2>

    <select onchange="filtrar('${id}',this.value)">
      ${tallas.map(t=>`<option>${t}</option>`)}
    </select>

    <p>📦 STOCK TOTAL: ${total}</p>

    <div id="tabla"></div>

    <button onclick="abrir('${cat}')">⬅ Volver</button>

  </div>
  `;

  filtrar(id,tallas[0]);
}

function filtrar(id,talla){
  const lista=inventario.filter(p=>p.id==id && p.talla==talla);

  let filas="";
  lista.forEach(v=>{
    filas+=`
      <tr>
        <td>${v.color}</td>
        <td>${v.stock}</td>
        <td>S/ ${v["p.unidad"]}</td>
        <td>S/ ${v["p.docena"]}</td>
      </tr>
    `;
  });

  tabla.innerHTML=`
    <table>
      <tr>
        <th>COLOR</th><th>STOCK</th><th>UNIDAD</th><th>DOCENA</th>
      </tr>
      ${filas}
    </table>
  `;
}

// PANEL
function abrirPanel(){
  menu.style.display="none";
  panel.style.display="block";
}

function abrirFormulario(){window.open("https://docs.google.com/forms")}
function verVentas(){window.open("https://docs.google.com/spreadsheets")}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&T KAMIARA</title>

<style>
body {
  background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
  color:white;
  font-family:Arial;
  margin:0;
  max-width:480px;
  margin:auto;
}

/* LOGIN */
#login {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.login-box {
  background:#111;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:320px;
  text-align:center;
}

input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
  margin-top:10px;
}

#errorLogin {color:#ff4d4d;}

/* HEADER */
#userInfo {text-align:center;margin-top:10px;}

.top-buttons {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}

.btn-salir {background:red;font-size:12px;padding:6px 15px;}
.btn-admin {background:#007bff;font-size:12px;padding:6px 15px;}

/* PORTADA */
#portada img {width:100%;height:200px;object-fit:cover;}
.titulo {text-align:center;font-size:20px;}
.sub {text-align:center;color:gray;}

/* MENU */
.grid-menu {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.menu-card {
  background:#111;
  border-radius:15px;
  overflow:hidden;
  text-align:center;
  cursor:pointer;
}

.menu-card img {width:100%;height:120px;object-fit:cover;}
.menu-card p {margin:5px;font-weight:bold;}

/* PRODUCTOS */
#productos {
  display:none;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#111;
  border-radius:15px;
  padding:10px;
  text-align:center;
}

.card img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

/* TABLA */
table {
  width:100%;
  background:#111;
  border-radius:10px;
  margin-top:10px;
}

th,td {padding:6px;font-size:12px;}

/* BOTON VOLVER PEQUEÑO */
.btn-volver {
  width:60%;
  margin:20px auto;
  display:block;
}

#panel {display:none;padding:20px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h3>Bienvenido</h3>
    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="guardarUsuario()">Entrar</button>
    <p id="errorLogin"></p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="userInfo"></div>

<div class="top-buttons">
  <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  <button class="btn-admin" id="panelBtn" onclick="abrirPanel()" style="display:none;">Panel</button>
</div>

<div id="portada">
  <img src="https://lh3.googleusercontent.com/d/1iSusezseDbUbs0jztHYHmSaX6kyzUKLG">
  <div class="titulo">CONTROL DE INVENTARIO</div>
  <div class="sub">A&T KAMIARA</div>
</div>

<!-- MENU -->
<div id="menu" class="grid-menu">
  <div class="menu-card" onclick="abrir('INVIERNO')"><img src="https://i.imgur.com/0rZ9F9G.jpg"><p>INVIERNO</p></div>
  <div class="menu-card" onclick="abrir('VERANO')"><img src="https://i.imgur.com/qIufhof.jpg"><p>VERANO</p></div>
  <div class="menu-card" onclick="abrir('TECNOLOGIA')"><img src="https://i.imgur.com/2DhmtJ4.jpg"><p>TECNOLOGÍA</p></div>
  <div class="menu-card" onclick="abrir('OTONO')"><img src="https://i.imgur.com/Y7mT4bT.jpg"><p>OTOÑO</p></div>
  <div class="menu-card" onclick="abrir('NAVIDAD')"><img src="https://i.imgur.com/YT6XGkZ.jpg"><p>NAVIDAD</p></div>
  <div class="menu-card" onclick="abrir('JUGUETES')"><img src="https://i.imgur.com/d2P6PqH.jpg"><p>JUGUETES</p></div>
</div>

<div id="productos"></div>

<!-- PANEL -->
<div id="panel">
  <h2>Panel Admin</h2>
  <button onclick="abrirFormulario()">➕ Agregar Producto</button>
  <button onclick="verVentas()">📊 Ver Ventas</button>
  <button onclick="inicio()">⬅ Volver</button>
</div>

</div>

<script>

// USUARIOS
const usuariosSistema = {
  luis:"123", katy:"123", katherine:"123",
  richard:"123", dante:"admin123"
};
const admins = ["dante"];

// LOGIN
function guardarUsuario(){
  const user = usuario.value.toLowerCase().trim();
  const pass = password.value;
  errorLogin.innerText="";

  if(!usuariosSistema[user]) return errorLogin.innerText="Usuario no registrado";
  if(usuariosSistema[user]!==pass) return errorLogin.innerText="Contraseña incorrecta";

  localStorage.setItem("usuario",user);
  location.reload();
}

function cerrarSesion(){
  localStorage.removeItem("usuario");
  location.reload();
}

// UI
window.onload=()=>{
  const user=localStorage.getItem("usuario");

  login.style.display = user ? "none":"flex";
  app.style.display = user ? "block":"none";

  if(user){
    const esAdmin = admins.includes(user);

    userInfo.innerHTML =
      `<span style="color:#00aaff;">USUARIO:</span>
       <span style="color:#00ff88;">${user.toUpperCase()}</span>
       ${esAdmin?" 🔑 ADMIN":""}`;

    if(esAdmin) panelBtn.style.display="inline-block";
  }
};

// INVENTARIO
const urlInv="https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/INVENTARIO";
let inventario=[];
let categoriaActual="";

fetch(urlInv)
.then(r=>r.json())
.then(d=>{
  inventario = d.map(p=>{
    let o={};
    Object.keys(p).forEach(k=>{
      o[k.trim().toLowerCase()] = p[k];
    });

    return {
      id:o.id,
      producto:o.producto,
      categoria:(o.categoria||"").toUpperCase(),
      talla:o.talla,
      color:o.color,
      stock:Number(o.stock||0),
      unidad:o["p.unidad"],
      docena:o["p.docena"],
      imagen:o.imagen
    };
  });
});

// MENU
function abrir(cat){
  categoriaActual = cat;

  menu.style.display="none";
  productos.style.display="grid";

  const filtrados = inventario.filter(p=>p.categoria===cat);

  const unicos={};
  filtrados.forEach(p=>{
    if(!unicos[p.id]) unicos[p.id]=p;
  });

  render(Object.values(unicos));

  productos.innerHTML += `<button class="btn-volver" onclick="inicio()">⬅ Volver</button>`;
}

function inicio(){
  menu.style.display="grid";
  productos.style.display="none";
  panel.style.display="none";
}

// PRODUCTOS
function render(lista){
  let html="";
  lista.forEach(p=>{
    html+=`
      <div class="card" onclick="verProducto('${p.id}')">
        <img src="${p.imagen}">
        <h3>${p.producto}</h3>
        <p style="color:lime;">S/ ${p.unidad}</p>
      </div>
    `;
  });
  productos.innerHTML = html;
}

// DETALLE PRO
function verProducto(id){

  const variantes = inventario.filter(p=>p.id==id);
  const p = variantes[0];

  const stockTotal = variantes.reduce((a,b)=>a+b.stock,0);
  const tallas=[...new Set(variantes.map(v=>v.talla))];

  const imgs=variantes.map(v=>v.imagen).filter(i=>i);
  const img1=imgs[0]||"";
  const img2=imgs[1]||img1;

  productos.style.display="block";

  productos.innerHTML=`
    <div>

      <div style="display:flex;overflow-x:auto;gap:10px;">
        <img src="${img1}" style="width:90%;border-radius:15px;">
        <img src="${img2}" style="width:90%;border-radius:15px;">
      </div>

      <h2>${p.producto}</h2>

      <select id="filtroTalla" onchange="filtrarTalla('${id}')">
        <option value="">Seleccionar talla</option>
        ${tallas.map(t=>`<option value="${t}">${t}</option>`).join("")}
      </select>

      <p style="color:#00ff88;">STOCK TOTAL: ${stockTotal}</p>

      <table id="tablaDetalle">
        <tr>
          <th>TALLA</th><th>COLOR</th><th>STOCK</th><th>P.UNIDAD</th><th>P.DOCENA</th>
        </tr>
      </table>

      <button onclick="volverALista()">⬅ Volver</button>
    </div>
  `;

  llenarTabla(variantes);
}

function llenarTabla(lista){
  let html="";
  lista.forEach(v=>{
    html+=`
      <tr>
        <td>${v.talla}</td>
        <td>${v.color}</td>
        <td>${v.stock}</td>
        <td>S/ ${v.unidad}</td>
        <td>S/ ${v.docena}</td>
      </tr>
    `;
  });

  document.getElementById("tablaDetalle").innerHTML += html;
}

function filtrarTalla(id){
  const talla = document.getElementById("filtroTalla").value;

  const variantes = inventario.filter(p=>p.id==id);
  const filtrados = talla ? variantes.filter(v=>v.talla===talla) : variantes;

  document.getElementById("tablaDetalle").innerHTML = `
    <tr>
      <th>TALLA</th><th>COLOR</th><th>STOCK</th><th>P.UNIDAD</th><th>P.DOCENA</th>
    </tr>
  `;

  llenarTabla(filtrados);
}

function volverALista(){
  abrir(categoriaActual);
}

// PANEL
const FORM_ADMIN="https://docs.google.com/forms/d/e/1FAIpQLSfkDXdS7HH4ud4ephIeo0qMyiXqiNXLjs_gpmZF7fDqBoE73A/viewform";
const SHEETS_VENTAS="https://docs.google.com/spreadsheets/d/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/edit#gid=0";

function abrirPanel(){
  menu.style.display="none";
  panel.style.display="block";
}

function abrirFormulario(){window.open(FORM_ADMIN)}
function verVentas(){window.open(SHEETS_VENTAS)}

</script>

</body>
</html>

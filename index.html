<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A&T KAMIARA</title>

<style>
body {background:#0b0b0b;color:white;font-family:Arial;margin:0;}

#pantallaLogin {
  position:fixed;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  background:#0b0b0b;z-index:999;
}

#app {max-width:500px;margin:auto;}

input {
  margin-top:10px;padding:10px;width:80%;
  border-radius:10px;border:none;
}

button {
  width:80%;margin-top:10px;padding:10px;
  border:none;border-radius:10px;background:red;color:white;
}

#barraUsuario {display:none;background:#111;padding:10px;text-align:center;}
.rol {color:#00aaff;font-weight:bold;}
.user {color:#00ff88;font-weight:bold;}

#menu {display:flex;flex-wrap:wrap;justify-content:center;}
.menu-card {width:40%;margin:10px;padding:10px;border-radius:15px;background:#111;text-align:center;}

#productos {display:none;flex-wrap:wrap;justify-content:center;}
.card {width:45%;margin:10px;padding:10px;border-radius:15px;background:#111;}
.card img {width:100%;border-radius:10px;}

#detalle {display:none;padding:15px;}
.tallas {display:flex;flex-wrap:wrap;justify-content:center;}
.talla-card {background:#111;margin:5px;padding:10px;border-radius:10px;width:45%;text-align:center;}

.back {background:#333;}
#volver {display:none;padding:10px;background:#222;text-align:center;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="pantallaLogin">
  <h1>A&T KAMIARA S.A.C</h1>
  <p style="color:gray;">Sistema de Inventario</p>
  <input id="usuario" placeholder="Usuario">
  <input id="password" type="password" placeholder="Contraseña">
  <button onclick="iniciarSesion()">Entrar</button>
  <p id="errorLogin" style="color:red;"></p>
</div>

<!-- APP -->
<div id="app">

<div id="barraUsuario">
  <span id="infoUser"></span>
  <button onclick="logout()" style="background:red;">Salir</button>
</div>

<div id="menu">
  <div class="menu-card" onclick="abrir('INVIERNO')">INVIERNO</div>
  <div class="menu-card" onclick="abrir('VERANO')">VERANO</div>
</div>

<div id="productos"></div>
<div id="detalle"></div>

</div>

<script>

// USUARIOS
const usuarios = {
  "luis": { pass: "1234", rol: "USUARIO" },
  "katy": { pass: "1234", rol: "USUARIA" },
  "richar": { pass: "admin123", rol: "ADMINISTRADOR" }
};

// INVENTARIO DEMO (puedes reemplazar por tu Google Sheets)
let inventario = [
  {producto:"Polera", talla:"S", stock:2, unidad:10, docena:100, cajon:500, categoria:"INVIERNO", imagen:"https://via.placeholder.com/150"},
  {producto:"Polera", talla:"M", stock:5, unidad:10, docena:100, cajon:500, categoria:"INVIERNO", imagen:"https://via.placeholder.com/150"},
  {producto:"Polera", talla:"L", stock:0, unidad:10, docena:100, cajon:500, categoria:"INVIERNO", imagen:"https://via.placeholder.com/150"}
];

// LOGIN
function iniciarSesion(){
  const user = usuario.value.toLowerCase();
  const pass = password.value;

  if(usuarios[user] && usuarios[user].pass === pass){
    localStorage.setItem("usuario", user);
    localStorage.setItem("rol", usuarios[user].rol);
    location.reload();
  } else {
    errorLogin.innerText="Datos incorrectos";
  }
}

// AUTO LOGIN
window.onload = ()=>{
  const user = localStorage.getItem("usuario");
  const rol = localStorage.getItem("rol");

  if(user){
    pantallaLogin.style.display="none";
    barraUsuario.style.display="block";

    infoUser.innerHTML = `👤 <span class="rol">${rol}</span> : <span class="user">${user.toUpperCase()}</span>`;
  } else {
    menu.style.display="none";
  }
};

// LOGOUT
function logout(){
  localStorage.clear();
  location.reload();
}

// ABRIR CATEGORIA
function abrir(cat){
  productos.style.display="flex";
  detalle.style.display="none";

  let lista = inventario.filter(p=>p.categoria===cat);

  let html="";
  lista.forEach(p=>{
    html+=`
      <div class="card" onclick="verDetalle('${p.producto}')">
        <img src="${p.imagen}">
        <h3>${p.producto}</h3>
      </div>
    `;
  });

  productos.innerHTML=html;
}

// DETALLE
function verDetalle(nombre){
  productos.style.display="none";
  detalle.style.display="block";

  let items = inventario.filter(p=>p.producto===nombre);

  let html=`<h2>${nombre}</h2><div class="tallas">`;

  items.forEach(p=>{
    let color = p.stock <= 3 ? "red" : "lime";
    let disabled = p.stock <= 0 ? "disabled" : "";

    html+=`
      <div class="talla-card">
        <h4>Talla ${p.talla}</h4>
        <p style="color:${color};font-weight:bold;">Stock: ${p.stock}</p>

        <p>Unidad: S/${p.unidad}</p>
        <p>Docena: S/${p.docena}</p>
        <p>Cajón: S/${p.cajon}</p>

        <button ${disabled} onclick="comprar('${p.producto}','${p.talla}')">
          ${p.stock <= 0 ? "Sin stock" : "Comprar"}
        </button>
      </div>
    `;
  });

  html+=`</div><button class="back" onclick="volver()">⬅ Volver</button>`;

  detalle.innerHTML=html;
}

// VOLVER
function volver(){
  detalle.style.display="none";
  productos.style.display="flex";
}

// COMPRAR
function comprar(prod,talla){
  alert("Venta: " + prod + " - Talla: " + talla);
}

</script>

</body>
</html>

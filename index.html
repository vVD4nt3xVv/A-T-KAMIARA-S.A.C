<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A&T KAMIARA</title>

<style>
body {background:#0b0b0b;color:white;font-family:Arial;margin:0;max-width:500px;margin:auto;}

/* LOGIN */
#pantallaLogin {
  display:flex;flex-direction:column;justify-content:center;
  align-items:center;height:100vh;text-align:center;
  background:#0b0b0b;
}

input {
  margin-top:10px;padding:10px;width:80%;
  border-radius:10px;border:none;
}

button {
  width:80%;margin-top:10px;padding:10px;
  border:none;border-radius:10px;background:red;color:white;
}

button:active {opacity:0.7;}

/* BARRA */
#barraUsuario {
  display:none;background:#111;padding:10px;text-align:center;
}

.rol {color:#00aaff;font-weight:bold;}
.user {color:#00ff88;font-weight:bold;}

/* RESTO IGUAL */
#portada img {width:100%;height:200px;object-fit:cover;}
.titulo {font-size:22px;margin-top:10px;text-align:center;}
.sub {color:gray;text-align:center;}

#menu {display:flex;flex-wrap:wrap;justify-content:center;}
.menu-card {
  width:40%;margin:10px;padding:10px;border-radius:15px;
  background:#111;text-align:center;
}
.menu-card:active {transform:scale(0.95);}

#productos {display:none;flex-wrap:wrap;justify-content:center;}
.card {
  width:45%;margin:10px;padding:10px;border-radius:15px;background:#111;
}
.card img {width:100%;border-radius:10px;}

#volver {display:none;padding:10px;background:#222;text-align:center;}
#panel, #dashboard {display:none;padding:20px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="pantallaLogin">
  <img src="https://via.placeholder.com/800x200">
  <h1>A&T KAMIARA S.A.C</h1>
  <p style="color:gray;">Sistema de Inventario</p>

  <input id="usuario" placeholder="Usuario">
  <input id="password" type="password" placeholder="Contraseña">

  <button onclick="iniciarSesion()">Entrar</button>
  <p id="errorLogin" style="color:red;"></p>
</div>

<!-- BARRA USUARIO -->
<div id="barraUsuario">
  <span id="infoUser"></span>
  <button onclick="logout()" style="background:red;">Salir</button>
</div>

<!-- PANEL BTN -->
<div id="panelBtn" style="display:none;">
  <button onclick="abrirPanel()">⚙️ PANEL ADMIN</button>
</div>

<!-- PORTADA -->
<div id="portada">
  <img src="https://via.placeholder.com/800x200">
  <div class="titulo">A&T KAMIARA S.A.C.</div>
  <div class="sub">Control de Inventario</div>
</div>

<!-- MENU -->
<div id="menu">
  <div class="menu-card" onclick="abrir('INVIERNO')">❄️ INVIERNO</div>
  <div class="menu-card" onclick="abrir('VERANO')">☀️ VERANO</div>
  <div class="menu-card" onclick="abrir('TECNOLOGIA')">💻 TECNOLOGÍA</div>
  <div class="menu-card" onclick="abrir('OTONO')">🍂 OTOÑO</div>
  <div class="menu-card" onclick="abrir('NAVIDAD')">🎄 NAVIDAD</div>
  <div class="menu-card" onclick="abrir('JUGUETES')">🧸 JUGUETES</div>
  <div class="menu-card" onclick="abrir('OTROS')">📦 OTROS</div>
</div>

<div id="volver" onclick="inicio()">⬅ Volver</div>
<div id="productos"></div>

<!-- PANEL -->
<div id="panel">
  <h2>Panel Admin</h2>
  <button onclick="abrirFormulario()">➕ Agregar Producto</button>
  <button onclick="verVentas()">📊 Ver Ventas</button>
  <button onclick="abrirDashboard()">📊 Dashboard</button>
  <button onclick="inicio()">⬅ Volver</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <h2>📊 Dashboard</h2>

  <p id="totalVentas"></p>
  <p id="ganancias"></p>

  <h3>🏆 Top Productos</h3>
  <ul id="topProductos"></ul>

  <h3>📅 Ventas por Día</h3>
  <canvas id="graficoDias" height="200"></canvas>

  <h3>⚠️ Stock Bajo</h3>
  <ul id="alertas"></ul>

  <button onclick="inicio()">⬅ Volver</button>
</div>

<script>

// USUARIOS
const usuarios = {
  "luis": { pass: "1234", rol: "GERENTE" },
  "katy": { pass: "1234", rol: "VENDEDORA" },
  "juan": { pass: "1234", rol: "VENDEDOR" },
  "richar": { pass: "admin123", rol: "PROGRAMADOR" }
};

// LOGIN CORREGIDO
function iniciarSesion(){
  const user = document.getElementById("usuario").value.toLowerCase();
  const pass = document.getElementById("password").value;

  if(usuarios[user] && usuarios[user].pass === pass){
    localStorage.setItem("usuario", user);
    localStorage.setItem("rol", usuarios[user].rol);
    location.reload();
  } else {
    document.getElementById("errorLogin").innerText = "Usuario o contraseña incorrectos";
  }
}

// AUTO LOGIN
window.onload = ()=>{
  const user = localStorage.getItem("usuario");
  const rol = localStorage.getItem("rol");

  if(user && rol){
    document.getElementById("pantallaLogin").style.display="none";
    document.getElementById("barraUsuario").style.display="block";

    document.getElementById("infoUser").innerHTML =
      `👤 <span class="rol">${rol}</span> : <span class="user">${user.toUpperCase()}</span>`;

    if(rol === "PROGRAMADOR"){
      document.getElementById("panelBtn").style.display="block";
    }

  } else {
    document.getElementById("menu").style.display="none";
  }
};

// LOGOUT
function logout(){
  localStorage.clear();
  location.reload();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&T KAMIARA</title>

<style>
body {
  background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
  color:white;
  font-family:Arial;
  margin:0;
  max-width:480px;
  margin:auto;
}

/* LOGIN */
#login {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.login-box {
  background:#111;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:320px;
  text-align:center;
}

.login-box input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

.login-box button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
}

#errorLogin {color:#ff4d4d;font-size:13px;}

/* HEADER */
#userInfo {text-align:center;margin-top:10px;}

.top-buttons {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}

.btn-salir {background:red;padding:6px 15px;border-radius:8px;}
.btn-admin {background:#007bff;padding:6px 15px;border-radius:8px;display:none;}

/* PORTADA */
#portada img {width:100%;height:200px;object-fit:cover;}
.titulo {text-align:center;font-size:22px;}
.sub {text-align:center;color:gray;}

/* MENU */
.grid-menu {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.menu-card {
  background:#111;
  border-radius:15px;
  overflow:hidden;
  text-align:center;
  cursor:pointer;
}

.menu-card img {width:100%;height:120px;object-fit:cover;}
.menu-card p {margin:5px;font-weight:bold;}

/* PRODUCTOS */
#productos {
  display:none;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#111;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.card img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

/* CARRUSEL */
.carrusel {
  display:flex;
  overflow-x:auto;
  gap:10px;
}

.carrusel img {
  width:100%;
  max-width:300px;
  border-radius:15px;
}

/* BOTONES */
button {
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
}

.btn-small {
  width:auto;
  padding:6px 12px;
  font-size:12px;
}

select {
  width:100%;
  padding:8px;
  border-radius:10px;
  background:#222;
  color:white;
  border:none;
  margin-top:10px;
}

#panel {display:none;padding:20px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h3>Bienvenido</h3>
    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="guardarUsuario()">Entrar</button>
    <p id="errorLogin"></p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="userInfo"></div>

<div class="top-buttons">
  <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  <button class="btn-admin" id="panelBtn" onclick="abrirPanel()">Panel</button>
</div>

<div id="portada">
  <!-- 🔥 IMAGEN BELINDA -->
  <img src="https://lh3.googleusercontent.com/d/1u0S5nSFWrKoncSE2NgZxMxvRUra4qFlF">
  <div class="titulo">CHALeco BELINDA</div>
  <div class="sub">A&T KAMIARA</div>
</div>

<!-- MENU -->
<div id="menu" class="grid-menu">
  <div class="menu-card" onclick="abrir('INVIERNO')"><img src="https://i.imgur.com/0rZ9F9G.jpg"><p>INVIERNO</p></div>
  <div class="menu-card" onclick="abrir('VERANO')"><img src="https://i.imgur.com/qIufhof.jpg"><p>VERANO</p></div>
  <div class="menu-card" onclick="abrir('TECNOLOGIA')"><img src="https://i.imgur.com/2DhmtJ4.jpg"><p>TECNOLOGÍA</p></div>
</div>

<div id="productos"></div>

<!-- PANEL -->
<div id="panel">
  <h2>Panel Admin</h2>
  <button onclick="abrirFormulario()">➕ Agregar Producto</button>
  <button onclick="verVentas()">📊 Ver Ventas</button>
  <button onclick="inicio()">⬅ Volver</button>
</div>

</div>

<script>

// USUARIOS
const usuariosSistema = {
  dante:"admin123",
  luis:"123"
};
const admins=["dante"];

// LOGIN
function guardarUsuario(){
  const user = usuario.value.toLowerCase().trim();
  const pass = password.value;

  if(!usuariosSistema[user]) return errorLogin.innerText="Usuario no registrado";
  if(usuariosSistema[user]!==pass) return errorLogin.innerText="Contraseña incorrecta";

  localStorage.setItem("usuario",user);
  location.reload();
}

function cerrarSesion(){
  localStorage.removeItem("usuario");
  location.reload();
}

// UI
window.onload=()=>{
  const user=localStorage.getItem("usuario");

  login.style.display=user?"none":"flex";
  app.style.display=user?"block":"none";
  panel.style.display="none";

  if(user){
    const esAdmin=admins.includes(user);

    userInfo.innerHTML=`
      <span style="color:#00aaff;">USUARIO:</span>
      <span style="color:#00ff88;">${user.toUpperCase()}</span>
      ${esAdmin?" 🔑 ADMIN":""}
    `;

    panelBtn.style.display = esAdmin ? "inline-block" : "none";
  }
};

// INVENTARIO
const urlInv="https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/INVENTARIO";
let inventario=[];
let categoriaActual="";

fetch(urlInv)
.then(r=>r.json())
.then(d=>{
  inventario=d.map(p=>{
    let o={};
    Object.keys(p).forEach(k=>o[k.trim().toLowerCase()]=p[k]);
    return {
      id:o.id,
      producto:o.producto,
      categoria:(o.categoria||"").toUpperCase(),
      talla:o.talla,
      color:o.color,
      stock:Number(o.stock)||0,
      unidad:o["p.unidad"],
      docena:o["p.docena"],
      imagen:o.imagen,
      imagen2:o.imagen2,
      imagen3:o.imagen3
    };
  });
});

// MENU
function abrir(cat){
  categoriaActual=cat;
  menu.style.display="none";
  productos.style.display="grid";

  const filtrados=inventario.filter(p=>p.categoria===cat && p.stock>0);

  const unicos={};
  filtrados.forEach(p=>{
    if(!unicos[p.id]) unicos[p.id]=p;
  });

  render(Object.values(unicos));
  productos.innerHTML+=`<button class="btn-small" onclick="inicio()">⬅ Volver</button>`;
}

function inicio(){
  menu.style.display="grid";
  productos.style.display="none";
  panel.style.display="none";
}

// LISTA
function render(lista){
  let html="";
  lista.forEach(p=>{
    html+=`
    <div class="card" onclick="verProducto('${p.id}')">
      <img src="${p.imagen}">
      <h3>${p.producto}</h3>
      <p style="color:lime;">S/ ${p.unidad}</p>
    </div>`;
  });
  productos.innerHTML=html;
}

// DETALLE
function verProducto(id){

  const variantes=inventario.filter(p=>p.id==id && p.stock>0);
  const p=variantes[0];

  const total=variantes.reduce((a,b)=>a+b.stock,0);

  const tallas=[...new Set(variantes.map(v=>v.talla))];

  let opciones="";
  tallas.forEach(t=>opciones+=`<option>${t}</option>`);

  productos.style.display="block";

  productos.innerHTML=`
  <div>

    <div class="carrusel">
      <img src="${p.imagen}">
      ${p.imagen2?`<img src="${p.imagen2}">`:""}
      ${p.imagen3?`<img src="${p.imagen3}">`:""}
    </div>

    <h2>${p.producto}</h2>

    <p>📦 Stock Total: ${total}</p>

    <select onchange="filtrarTalla('${id}',this.value)">
      ${opciones}
    </select>

    <div id="tabla"></div>

    <button onclick="abrir('${categoriaActual}')">⬅ Volver</button>

  </div>
  `;

  filtrarTalla(id,tallas[0]);
}

// FILTRO
function filtrarTalla(id,talla){
  const datos=inventario.filter(p=>p.id==id && p.talla==talla);

  let filas="";
  datos.forEach(v=>{
    filas+=`
    <tr>
      <td>${v.color}</td>
      <td>${v.stock}</td>
      <td>S/ ${v.unidad}</td>
      <td>S/ ${v.docena}</td>
    </tr>`;
  });

  tabla.innerHTML=`
  <table>
    <tr><th>COLOR</th><th>STOCK</th><th>UNIDAD</th><th>DOCENA</th></tr>
    ${filas}
  </table>`;
}

// PANEL
const FORM_ADMIN="https://docs.google.com/forms/d/e/1FAIpQLSfkDXdS7HH4ud4ephIeo0qMyiXqiNXLjs_gpmZF7fDqBoE73A/viewform";
const SHEETS_VENTAS="https://docs.google.com/spreadsheets/d/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/edit#gid=0";

function abrirPanel(){
  menu.style.display="none";
  productos.style.display="none";
  panel.style.display="block";
}

function abrirFormulario(){window.open(FORM_ADMIN)}
function verVentas(){window.open(SHEETS_VENTAS)}

</script>

</body>
</html>

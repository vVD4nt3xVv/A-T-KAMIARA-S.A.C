<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&T KAMIARA</title>

<style>
body {
  background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
  color:white;
  font-family:Arial;
  margin:0;
  max-width:480px;
  margin:auto;
}

/* LOGIN */
#login {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  padding:10px;
}

.login-box {
  background:#111;
  padding:20px;
  border-radius:20px;
  width:100%;
  max-width:320px;
  text-align:center;
}

.login-box input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

.login-box button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
}

#errorLogin {color:#ff4d4d;font-size:13px;}

/* HEADER */
#userInfo {text-align:center;margin-top:10px;}

.top-buttons {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}

.btn-salir {
  background:red;
  padding:6px 15px;
  font-size:12px;
  border-radius:8px;
}

.btn-admin {
  background:#007bff;
  padding:6px 15px;
  font-size:12px;
  border-radius:8px;
}

/* PORTADA */
#portada img {width:100%;height:200px;object-fit:cover;}
.titulo {text-align:center;font-size:22px;}
.sub {text-align:center;color:gray;}

/* MENU */
.grid-menu {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.menu-card {
  background:#111;
  border-radius:15px;
  overflow:hidden;
  text-align:center;
  cursor:pointer;
}

.menu-card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

.menu-card p {
  margin:5px;
  font-weight:bold;
}

/* PRODUCTOS */
#productos {display:none;flex-wrap:wrap;justify-content:center;}

.card {
  width:45%;
  margin:10px;
  padding:10px;
  border-radius:15px;
  background:#111;
  text-align:center;
  cursor:pointer;
}

.card img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

/* BOTONES GENERALES */
button {
  width:100%;
  margin-top:5px;
  padding:8px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
}

/* BOTONES ABAJO */
.bottom-btn {
  margin-top:20px;
}

/* SECCIONES */
#volver, #panel, #dashboard {display:none;padding:20px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h3>Bienvenido</h3>
    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="guardarUsuario()">Entrar</button>
    <p id="errorLogin"></p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="userInfo"></div>

<div class="top-buttons">
  <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  <button class="btn-admin" id="panelBtn" onclick="abrirPanel()" style="display:none;">Panel</button>
</div>

<div id="portada">
  <img src="https://via.placeholder.com/800x200">
  <div class="titulo">A&T KAMIARA S.A.C.</div>
  <div class="sub">Control de Inventario</div>
</div>

<!-- MENU -->
<div id="menu" class="grid-menu">
  <div class="menu-card" onclick="abrir('INVIERNO')"><img src="https://i.imgur.com/0rZ9F9G.jpg"><p>INVIERNO</p></div>
  <div class="menu-card" onclick="abrir('VERANO')"><img src="https://i.imgur.com/qIufhof.jpg"><p>VERANO</p></div>
  <div class="menu-card" onclick="abrir('TECNOLOGIA')"><img src="https://i.imgur.com/2DhmtJ4.jpg"><p>TECNOLOGÍA</p></div>
  <div class="menu-card" onclick="abrir('OTONO')"><img src="https://i.imgur.com/Y7mT4bT.jpg"><p>OTOÑO</p></div>
  <div class="menu-card" onclick="abrir('NAVIDAD')"><img src="https://i.imgur.com/YT6XGkZ.jpg"><p>NAVIDAD</p></div>
  <div class="menu-card" onclick="abrir('JUGUETES')"><img src="https://i.imgur.com/d2P6PqH.jpg"><p>JUGUETES</p></div>
</div>

<div id="productos"></div>

<!-- PANEL -->
<div id="panel">
  <h2>Panel Admin</h2>
  <button onclick="abrirFormulario()">➕ Agregar Producto</button>
  <button onclick="verVentas()">📊 Ver Ventas</button>
  <button class="bottom-btn" onclick="inicio()">⬅ Volver</button>
</div>

</div>

<script>

// USUARIOS
const usuariosSistema = {
  luis:"123", katy:"123", katherine:"123",
  richard:"123", dante:"admin123"
};
const admins = ["dante"];

// LOGIN
function guardarUsuario(){
  const user = usuario.value.toLowerCase().trim();
  const pass = password.value;
  errorLogin.innerText="";

  if(!usuariosSistema[user]) return errorLogin.innerText="Usuario no registrado";
  if(usuariosSistema[user]!==pass) return errorLogin.innerText="Contraseña incorrecta";

  localStorage.setItem("usuario",user);
  location.reload();
}

function cerrarSesion(){
  localStorage.removeItem("usuario");
  location.reload();
}

// UI
window.onload=()=>{
  window.scrollTo(0,0);

  const user=localStorage.getItem("usuario");

  login.style.display = user ? "none":"flex";
  app.style.display = user ? "block":"none";

  if(user){
    const esAdmin = admins.includes(user);

    userInfo.innerHTML =
      `<span style="color:#00aaff;">USUARIO:</span>
       <span style="color:#00ff88;">${user.toUpperCase()}</span>
       ${esAdmin?" 🔑 ADMIN":""}`;

    if(esAdmin) panelBtn.style.display="inline-block";
  }
};

// INVENTARIO FLEXIBLE
const urlInv="https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/INVENTARIO";
let inventario=[];

fetch(urlInv)
.then(r=>r.json())
.then(d=>{
  inventario = d.map(p=>{
    let o={};
    Object.keys(p).forEach(k=>{
      o[k.trim().toLowerCase()] = p[k];
    });

    return {
      producto:o.producto||"",
      stock:o.stock||0,
      unidad:o.unidad||0,
      docena:o.docena||0,
      cajon:o.cajon||0,
      imagen:o.imagen||"",
      categoria:(o.categoria||"").toUpperCase()
    };
  });
});

// MENU
function abrir(cat){
  menu.style.display="none";
  productos.style.display="flex";

  render(inventario.filter(p=>p.categoria===cat.toUpperCase()));
}

function inicio(){
  menu.style.display="grid";
  productos.style.display="none";
  panel.style.display="none";
}

// PRODUCTOS
function render(lista){
  let html="";
  lista.forEach(p=>{
    html+=`
      <div class="card" onclick="verProducto('${encodeURIComponent(JSON.stringify(p))}')">
        <img src="${p.imagen}">
        <h3>${p.producto}</h3>
        <p style="color:lime;">S/ ${p.unidad}</p>
      </div>
    `;
  });
  productos.innerHTML = html;
}

// DETALLE
function verProducto(data){
  const p = JSON.parse(decodeURIComponent(data));

  productos.innerHTML = `
    <div>
      <img src="${p.imagen}" style="width:100%;border-radius:15px;">
      <h2>${p.producto}</h2>

      <table style="width:100%;text-align:center;background:#111;border-radius:10px;">
        <tr>
          <th>TALLA</th><th>STOCK</th><th>PRECIO</th><th>DOCENA</th><th>CAJÓN</th>
        </tr>
        <tr>
          <td>S</td><td>${p.stock}</td><td>S/ ${p.unidad}</td><td>S/ ${p.docena}</td><td>S/ ${p.cajon}</td>
        </tr>
        <tr>
          <td>M</td><td>${p.stock}</td><td>S/ ${p.unidad}</td><td>S/ ${p.docena}</td><td>S/ ${p.cajon}</td>
        </tr>
      </table>

      <button class="bottom-btn" onclick="inicio()">⬅ Volver</button>
    </div>
  `;
}

// PANEL
const FORM_ADMIN="https://docs.google.com/forms/d/e/1FAIpQLSfkDXdS7HH4ud4ephIeo0qMyiXqiNXLjs_gpmZF7fDqBoE73A/viewform";
const SHEETS_VENTAS="https://docs.google.com/spreadsheets/d/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/edit#gid=0";

function abrirPanel(){
  menu.style.display="none";
  panel.style.display="block";
}

function abrirFormulario(){window.open(FORM_ADMIN)}
function verVentas(){window.open(SHEETS_VENTAS)}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&T KAMIARA</title>

<style>
body {
  background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
  color:white;
  font-family:Arial;
  margin:0;
  max-width:480px;
  margin:auto;
}

/* LOGIN */
#login {display:flex;align-items:center;justify-content:center;height:100vh;}
.login-box {background:#111;padding:20px;border-radius:20px;width:90%;max-width:320px;text-align:center;}
.login-box input {width:100%;padding:10px;margin:6px 0;border:none;border-radius:10px;background:#222;color:white;}
.login-box button {width:100%;padding:10px;border:none;border-radius:10px;background:red;color:white;}
#errorLogin {color:red;}

/* HEADER */
#userInfo {text-align:center;margin-top:10px;}
.top-buttons {display:flex;justify-content:center;gap:10px;margin:10px;}
.btn-salir {background:red;padding:6px 15px;border-radius:8px;}
.btn-admin {background:#007bff;padding:6px 15px;border-radius:8px;}

/* PORTADA */
#portada img {width:100%;height:200px;object-fit:cover;}
.titulo {text-align:center;font-size:22px;}
.sub {text-align:center;color:gray;}

/* MENU */
.grid-menu {display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}
.menu-card {background:#111;border-radius:15px;text-align:center;cursor:pointer;}
.menu-card img {width:100%;height:120px;object-fit:cover;}

/* PRODUCTOS */
#productos {display:none;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}
.card {background:#111;border-radius:15px;padding:10px;text-align:center;cursor:pointer;}
.card img {width:100%;height:140px;object-fit:cover;border-radius:10px;}

/* TABLA */
table {width:100%;background:#111;border-radius:10px;margin-top:10px;border-collapse:collapse;}
th,td {padding:10px;text-align:center;font-size:13px;}

/* SELECTOR */
.selector {display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
select {padding:8px;border-radius:8px;border:none;}

/* CARRUSEL */
.carrusel {
  display:flex;
  overflow-x:auto;
  gap:10px;
  margin-bottom:10px;
}
.carrusel img {
  width:80%;
  border-radius:15px;
}

/* BOTONES */
button {width:100%;margin-top:10px;padding:10px;border:none;border-radius:10px;background:red;color:white;}

#panel {display:none;padding:20px;}
</style>
</head>

<body>

<div id="login">
  <div class="login-box">
    <h3>Bienvenido</h3>
    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="guardarUsuario()">Entrar</button>
    <p id="errorLogin"></p>
  </div>
</div>

<div id="app" style="display:none;">

<div id="userInfo"></div>

<div class="top-buttons">
  <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  <button class="btn-admin" id="panelBtn" onclick="abrirPanel()" style="display:none;">Panel</button>
</div>

<div id="portada">
  <img src="https://lh3.googleusercontent.com/d/1iSusezseDbUbs0jztHYHmSaX6kyzUKLG">
  <div class="titulo">CONTROL DE INVENTARIO</div>
  <div class="sub">A&T KAMIARA</div>
</div>

<div id="menu" class="grid-menu">
  <div class="menu-card" onclick="abrir('INVIERNO')"><img src="https://i.imgur.com/0rZ9F9G.jpg"><p>INVIERNO</p></div>
  <div class="menu-card" onclick="abrir('VERANO')"><img src="https://i.imgur.com/qIufhof.jpg"><p>VERANO</p></div>
</div>

<div id="productos"></div>

<div id="panel">
  <h2>Panel Admin</h2>
  <button onclick="abrirFormulario()">➕ Agregar Producto</button>
  <button onclick="verVentas()">📊 Ver Ventas</button>
  <button onclick="inicio()">⬅ Volver</button>
</div>

</div>

<script>

const usuariosSistema = { luis:"123", dante:"admin123" };
const admins = ["dante"];

function guardarUsuario(){
  const user = usuario.value.toLowerCase();
  const pass = password.value;
  if(usuariosSistema[user]!==pass) return errorLogin.innerText="Error";
  localStorage.setItem("usuario",user);
  location.reload();
}

function cerrarSesion(){localStorage.clear();location.reload();}

window.onload=()=>{
  const user=localStorage.getItem("usuario");
  login.style.display = user?"none":"flex";
  app.style.display = user?"block":"none";
  if(user){
    userInfo.innerHTML="USUARIO: "+user;
    if(admins.includes(user)) panelBtn.style.display="inline-block";
  }
};

// INVENTARIO
let inventario=[];
fetch("https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/INVENTARIO")
.then(r=>r.json()).then(d=>{
  inventario=d.map(p=>{
    let o={}; Object.keys(p).forEach(k=>o[k.toLowerCase().trim()]=p[k]);
    return {
      id:o.id, producto:o.producto, categoria:(o.categoria||"").toUpperCase(),
      talla:o.talla, color:o.color, stock:Number(o.stock||0),
      unidad:o["p.unidad"], docena:o["p.docena"],
      imagen:o.imagen
    };
  });
});

// MENU
function abrir(cat){
  menu.style.display="none";
  productos.style.display="grid";

  let filtrados=inventario.filter(p=>p.categoria===cat && p.stock>0);

  let unicos={};
  filtrados.forEach(p=>{if(!unicos[p.id])unicos[p.id]=p;});

  render(Object.values(unicos));

  productos.innerHTML+=`<button onclick="inicio()">⬅ Volver</button>`;
}

function inicio(){
  menu.style.display="grid";
  productos.style.display="none";
  panel.style.display="none";
}

// LISTA
function render(lista){
  let html="";
  lista.forEach(p=>{
    html+=`
    <div class="card" onclick="verProducto('${p.id}')">
      <img src="${p.imagen}">
      <h3>${p.producto}</h3>
      <p style="color:lime;">S/ ${p.unidad}</p>
    </div>`;
  });
  productos.innerHTML=html;
}

// DETALLE PRO
function verProducto(id){

  const variantes = inventario.filter(p=>p.id==id && p.stock>0);
  const p = variantes[0];

  let tallas=[...new Set(variantes.map(v=>v.talla))];

  // IMÁGENES (máx 3)
  let imgs=[...new Set(variantes.map(v=>v.imagen))].slice(0,3);

  function renderTabla(tallaSel){
    let datos=variantes.filter(v=>!tallaSel || v.talla==tallaSel);

    return datos.map(v=>`
      <tr>
        <td>${v.talla}</td>
        <td>${v.color}</td>
        <td>${v.stock}</td>
        <td>S/ ${v.unidad}</td>
        <td>S/ ${v.docena}</td>
      </tr>
    `).join("");
  }

  productos.innerHTML=`
  <div>

    <div class="carrusel">
      ${imgs.map(i=>`<img src="${i}">`).join("")}
    </div>

    <h2>${p.producto}</h2>

    <div class="selector">
      <div>
        <label>Talla:</label>
        <select id="filtroTalla">
          <option value="">Todas</option>
          ${tallas.map(t=>`<option>${t}</option>`).join("")}
        </select>
      </div>
    </div>

    <table id="tabla">
      <tr>
        <th>TALLA</th><th>COLOR</th><th>STOCK</th><th>UND</th><th>DOCENA</th>
      </tr>
      ${renderTabla()}
    </table>

    <button onclick="abrir('${p.categoria}')">⬅ Volver</button>
  </div>
  `;

  // FILTRO REAL
  document.getElementById("filtroTalla").onchange=function(){
    document.getElementById("tabla").innerHTML=`
      <tr>
        <th>TALLA</th><th>COLOR</th><th>STOCK</th><th>UND</th><th>DOCENA</th>
      </tr>
      ${renderTabla(this.value)}
    `;
  };
}

// PANEL
function abrirPanel(){
  menu.style.display="none";
  panel.style.display="block";
}

function abrirFormulario(){window.open("https://docs.google.com/forms")}
function verVentas(){window.open("https://docs.google.com")}

</script>

</body>
</html>

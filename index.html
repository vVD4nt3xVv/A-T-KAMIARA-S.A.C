<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&T KAMIARA</title>

<style>
body {
  background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
  color:white;
  font-family:Arial;
  margin:0;
  max-width:480px;
  margin:auto;
}

/* LOGIN */
#login {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.login-box {
  background:#111;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:320px;
  text-align:center;
}

.login-box input, .login-box button {
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:10px;
}

.login-box input {background:#222;color:white;}
.login-box button {background:red;color:white;}

#errorLogin {color:#ff4d4d;}

/* HEADER */
#userInfo {text-align:center;margin-top:10px;}

.top-buttons {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}

.btn-salir {background:red;padding:6px 15px;border-radius:8px;}
.btn-admin {background:#007bff;padding:6px 15px;border-radius:8px;display:none;}

/* PORTADA */
#portada img {width:100%;height:200px;object-fit:cover;}
.titulo {text-align:center;font-size:22px;}
.sub {text-align:center;color:gray;}

/* MENU */
.grid-menu {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.menu-card {
  background:#111;
  border-radius:15px;
  overflow:hidden;
  text-align:center;
  cursor:pointer;
}

.menu-card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

/* PRODUCTOS */
#productos {
  display:none;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#111;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.card img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

/* DETALLE */
.detalle-img {
  width:100%;
  border-radius:15px;
}

/* FILA COMPACTA */
.fila-opciones {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#111;
  padding:8px;
  border-radius:10px;
  margin-top:10px;
  font-size:12px;
}

/* SELECT */
select {
  background:#222;
  color:white;
  border:none;
  border-radius:8px;
  padding:5px;
}

/* BOTONES */
button {
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
}

#panel {display:none;padding:20px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h3>Bienvenido</h3>
    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="guardarUsuario()">Entrar</button>
    <p id="errorLogin"></p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="userInfo"></div>

<div class="top-buttons">
  <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  <button class="btn-admin" id="panelBtn" onclick="abrirPanel()">Panel</button>
</div>

<div id="portada">
  <img src="https://lh3.googleusercontent.com/d/1iSusezseDbUbs0jztHYHmSaX6kyzUKLG">
  <div class="titulo">CONTROL DE INVENTARIO</div>
  <div class="sub">A&T KAMIARA</div>
</div>

<!-- MENU -->
<div id="menu" class="grid-menu">
  <div class="menu-card" onclick="abrir('INVIERNO')"><img src="https://i.imgur.com/0rZ9F9G.jpg"><p>INVIERNO</p></div>
  <div class="menu-card" onclick="abrir('VERANO')"><img src="https://i.imgur.com/qIufhof.jpg"><p>VERANO</p></div>
</div>

<div id="productos"></div>

<!-- PANEL -->
<div id="panel">
  <h2>Panel Admin</h2>
  <button onclick="abrirFormulario()">➕ Agregar Producto</button>
  <button onclick="verVentas()">📊 Ver Ventas</button>
  <button onclick="inicio()">⬅ Volver</button>
</div>

</div>

<script>

// USUARIOS
const usuariosSistema = { dante:"admin123" };
const admins = ["dante"];

// LOGIN
function guardarUsuario(){
  const user=usuario.value.toLowerCase();
  const pass=password.value;

  if(!usuariosSistema[user]) return errorLogin.innerText="Usuario no registrado";
  if(usuariosSistema[user]!==pass) return errorLogin.innerText="Contraseña incorrecta";

  localStorage.setItem("usuario",user);
  location.reload();
}

function cerrarSesion(){
  localStorage.removeItem("usuario");
  location.reload();
}

// UI
window.onload=()=>{
  const user=localStorage.getItem("usuario");

  login.style.display=user?"none":"flex";
  app.style.display=user?"block":"none";

  if(user){
    userInfo.innerHTML=`USUARIO: ${user.toUpperCase()}`;
    if(admins.includes(user)) panelBtn.style.display="inline-block";
  }
};

// INVENTARIO
const urlInv="https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/INVENTARIO";
let inventario=[];

fetch(urlInv)
.then(r=>r.json())
.then(d=>{
  inventario=d.map(p=>{
    let o={};
    Object.keys(p).forEach(k=>o[k.toLowerCase().trim()]=p[k]);

    return {
      id:o.id,
      producto:o.producto,
      categoria:(o.categoria||"").toUpperCase(),
      talla:o.talla,
      color:o.color,
      stock:parseInt(o.stock)||0,
      unidad:o["p.unidad"],
      docena:o["p.docena"],
      imagen:o.imagen
    };
  });
});

// MENU
function abrir(cat){
  menu.style.display="none";
  productos.style.display="grid";

  const filtrados=inventario.filter(p=>p.categoria===cat && p.stock>0);

  const unicos={};
  filtrados.forEach(p=>{ if(!unicos[p.id]) unicos[p.id]=p; });

  render(Object.values(unicos));

  productos.innerHTML+=`<button onclick="inicio()">⬅ Volver</button>`;
}

function inicio(){
  menu.style.display="grid";
  productos.style.display="none";
  panel.style.display="none";
}

// LISTA
function render(lista){
  let html="";
  lista.forEach(p=>{
    html+=`
    <div class="card" onclick="verProducto('${p.id}')">
      <img src="${p.imagen}">
      <h3>${p.producto}</h3>
      <p style="color:lime;">S/ ${p.unidad}</p>
    </div>`;
  });
  productos.innerHTML=html;
}

// DETALLE PRO
function verProducto(id){

  const variantes=inventario.filter(p=>p.id==id);
  const p=variantes[0];

  const tallas=[...new Set(variantes.map(v=>v.talla))];

  const stockTotal=variantes.reduce((a,b)=>a+b.stock,0);

  productos.innerHTML=`
    <div>
      <img class="detalle-img" src="${p.imagen}">
      <h2>${p.producto}</h2>

      <div class="fila-opciones">
        <select id="tallaSelect" onchange="cambiarTalla('${id}')">
          ${tallas.map(t=>`<option>${t}</option>`).join("")}
        </select>

        <div>📦 <span id="stockTalla">0</span></div>
        <div>📊 ${stockTotal}</div>
      </div>

      <table>
        <tr>
          <th>TALLA</th><th>COLOR</th><th>STOCK</th><th>P.UNIDAD</th><th>P.DOCENA</th>
        </tr>
        ${variantes.map(v=>`
          <tr>
            <td>${v.talla}</td>
            <td>${v.color}</td>
            <td>${v.stock}</td>
            <td>S/ ${v.unidad}</td>
            <td>S/ ${v.docena}</td>
          </tr>
        `).join("")}
      </table>

      <button onclick="volverLista('${p.categoria}')">⬅ Volver</button>
    </div>
  `;

  cambiarTalla(id);
}

// STOCK DINÁMICO
function cambiarTalla(id){
  const talla=document.getElementById("tallaSelect").value;

  const filtrados=inventario.filter(p=>p.id==id && p.talla==talla);

  const total=filtrados.reduce((a,b)=>a+b.stock,0);

  document.getElementById("stockTalla").innerText=total;
}

// VOLVER CORRECTO
function volverLista(cat){
  abrir(cat);
}

// PANEL
function abrirPanel(){
  menu.style.display="none";
  panel.style.display="block";
}

function abrirFormulario(){
  window.open("https://docs.google.com/forms/d/e/1FAIpQLSfkDXdS7HH4ud4ephIeo0qMyiXqiNXLjs_gpmZF7fDqBoE73A/viewform");
}

function verVentas(){
  window.open("https://docs.google.com/spreadsheets/d/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE");
}

</script>

</body>
</html>

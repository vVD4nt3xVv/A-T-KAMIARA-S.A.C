<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&T KAMIARA</title>

<style>
body {
  background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
  color:white;
  font-family:Arial;
  margin:0;
  max-width:480px;
  margin:auto;
}

/* LOGIN */
#login {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.login-box {
  background:#111;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:320px;
  text-align:center;
}

.login-box input, .login-box button {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

.login-box input {background:#222;color:white;}
.login-box button {background:red;color:white;}

#errorLogin {color:red;font-size:13px;}

/* HEADER */
#userInfo {text-align:center;margin-top:10px;}

.top-buttons {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}

.btn-salir {background:red;padding:6px 15px;border-radius:8px;}
.btn-admin {background:#007bff;padding:6px 15px;border-radius:8px;}

/* PORTADA */
#portada img {width:100%;height:200px;object-fit:cover;}
.titulo {text-align:center;font-size:22px;}
.sub {text-align:center;color:gray;}

/* MENU */
.grid-menu {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.menu-card {
  background:#111;
  border-radius:15px;
  overflow:hidden;
  text-align:center;
  cursor:pointer;
}

.menu-card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

/* PRODUCTOS */
#productos {
  display:none;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#111;
  border-radius:15px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.card img {
  width:100%;
  height:140px;
  object-fit:cover;
}

/* TABLA */
table {
  width:100%;
  background:#111;
  border-radius:10px;
  margin-top:10px;
}

th,td {padding:6px;font-size:12px;}

/* BOTONES */
button {
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
}

/* BOTON PEQUEÑO */
.btn-small {
  width:auto;
  padding:6px 12px;
  font-size:12px;
  margin:10px;
}

/* FILTRO */
select {
  width:100%;
  padding:8px;
  border-radius:10px;
  margin-top:10px;
  background:#222;
  color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h3>Bienvenido</h3>
    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="guardarUsuario()">Entrar</button>
    <p id="errorLogin"></p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="userInfo"></div>

<div class="top-buttons">
  <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  <button class="btn-admin" id="panelBtn" onclick="abrirPanel()" style="display:none;">Panel</button>
</div>

<div id="portada">
  <img src="https://lh3.googleusercontent.com/d/1iSusezseDbUbs0jztHYHmSaX6kyzUKLG">
  <div class="titulo">CONTROL DE INVENTARIO</div>
</div>

<!-- MENU -->
<div id="menu" class="grid-menu">
  <div class="menu-card" onclick="abrir('INVIERNO')"><img src="https://i.imgur.com/0rZ9F9G.jpg"></div>
  <div class="menu-card" onclick="abrir('VERANO')"><img src="https://i.imgur.com/qIufhof.jpg"></div>
</div>

<div id="productos"></div>

</div>

<script>

// LOGIN
const usuariosSistema={dante:"admin123"};
function guardarUsuario(){
  if(usuariosSistema[usuario.value]==password.value){
    localStorage.setItem("usuario","ok");
    location.reload();
  }else errorLogin.innerText="Error";
}
function cerrarSesion(){localStorage.clear();location.reload();}

window.onload=()=>{
  if(localStorage.getItem("usuario")){
    login.style.display="none";
    app.style.display="block";
  }
}

// INVENTARIO
const url="https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/INVENTARIO";
let inventario=[];

fetch(url).then(r=>r.json()).then(d=>{
  inventario=d.map(p=>{
    let o={};
    Object.keys(p).forEach(k=>o[k.toLowerCase().trim()]=p[k]);
    return {
      id:o.id,
      producto:o.producto,
      categoria:o.categoria.toUpperCase(),
      talla:o.talla,
      color:o.color,
      stock:o.stock,
      unidad:o["p.unidad"],
      docena:o["p.docena"],
      imagen:o.imagen
    }
  });
});

// VARIABLES DE NAVEGACIÓN
let categoriaActual=null;
let productoActual=null;

// ABRIR CATEGORIA
function abrir(cat){
  categoriaActual=cat;
  menu.style.display="none";
  productos.style.display="grid";

  const filtrados=inventario.filter(p=>p.categoria==cat);
  const unicos={};

  filtrados.forEach(p=>{
    if(!unicos[p.id]) unicos[p.id]=p;
  });

  render(Object.values(unicos));

  productos.innerHTML += `<button class="btn-small" onclick="inicio()">⬅ Volver</button>`;
}

// INICIO
function inicio(){
  menu.style.display="grid";
  productos.style.display="none";
}

// LISTA PRODUCTOS
function render(lista){
  let html="";
  lista.forEach(p=>{
    html+=`
    <div class="card" onclick="verProducto('${p.id}')">
      <img src="${p.imagen}">
      <h4>${p.producto}</h4>
      <p>S/ ${p.unidad}</p>
    </div>`;
  });
  productos.innerHTML=html;
}

// VER PRODUCTO
function verProducto(id){
  productoActual=id;

  const variantes=inventario.filter(p=>p.id==id);
  const tallas=[...new Set(variantes.map(v=>v.talla))];

  let opciones="";
  tallas.forEach(t=>{
    opciones+=`<option value="${t}">${t}</option>`;
  });

  productos.innerHTML=`
    <div>
      <img src="${variantes[0].imagen}" style="width:100%">
      <h2>${variantes[0].producto}</h2>

      <select onchange="filtrarTalla(this.value,${id})">
        <option>Selecciona talla</option>
        ${opciones}
      </select>

      <div id="tabla"></div>

      <button onclick="volverProductos()">⬅ Volver</button>
    </div>
  `;
}

// FILTRO POR TALLA
function filtrarTalla(talla,id){
  const data=inventario.filter(p=>p.id==id && p.talla==talla);

  let filas="";
  data.forEach(v=>{
    filas+=`
      <tr>
        <td>${v.color}</td>
        <td>${v.stock}</td>
        <td>S/ ${v.unidad}</td>
        <td>S/ ${v.docena}</td>
      </tr>`;
  });

  tabla.innerHTML=`
    <table>
      <tr><th>COLOR</th><th>STOCK</th><th>UNIDAD</th><th>DOCENA</th></tr>
      ${filas}
    </table>`;
}

// VOLVER A PRODUCTOS (CORREGIDO)
function volverProductos(){
  abrir(categoriaActual);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A&T KAMIARA</title>

<style>
body {background:#0b0b0b;color:white;font-family:Arial;margin:0;max-width:500px;margin:auto;}

/* LOGIN */
#login {
  display:flex;flex-direction:column;justify-content:center;
  align-items:center;height:100vh;text-align:center;
  position:fixed;width:100%;background:#0b0b0b;z-index:999;
}

input {
  margin-top:10px;padding:10px;width:80%;
  border-radius:10px;border:none;
}

button {
  width:80%;margin-top:10px;padding:10px;
  border:none;border-radius:10px;background:red;color:white;
}

/* BARRA */
#barraUsuario {
  display:none;background:#111;padding:10px;text-align:center;
}

.rol {color:#00aaff;font-weight:bold;}
.user {color:#00ff88;font-weight:bold;}

/* MENU */
#menu {display:flex;flex-wrap:wrap;justify-content:center;}
.menu-card {
  width:40%;margin:10px;padding:15px;border-radius:15px;
  background:#111;text-align:center;
}

/* PRODUCTOS */
#productos {display:none;flex-wrap:wrap;justify-content:center;}

.card {
  width:45%;margin:10px;padding:10px;border-radius:15px;background:#111;
  text-align:center;
}
.card img {width:100%;border-radius:10px;}

/* DETALLE */
#detalle {display:none;padding:15px;text-align:center;}

.tallas {
  display:flex;flex-wrap:wrap;justify-content:center;
}

.talla-card {
  background:#111;margin:5px;padding:10px;border-radius:10px;width:45%;
}

.back {background:#333;margin-top:10px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <img src="https://via.placeholder.com/800x200" style="width:100%;height:180px;">
  <h1>A&T KAMIARA S.A.C</h1>
  <p style="color:gray;">Sistema de Inventario</p>

  <input id="usuario" placeholder="Usuario">
  <input id="password" type="password" placeholder="Contraseña">

  <button onclick="login()">Entrar</button>
  <p id="errorLogin" style="color:red;"></p>
</div>

<!-- BARRA -->
<div id="barraUsuario">
  <span id="infoUser"></span>
  <button onclick="logout()" style="background:red;">Salir</button>
</div>

<!-- MENU -->
<div id="menu">
  <div class="menu-card" onclick="abrir('INVIERNO')">❄️ INVIERNO</div>
  <div class="menu-card" onclick="abrir('VERANO')">☀️ VERANO</div>
</div>

<!-- PRODUCTOS -->
<div id="productos"></div>

<!-- DETALLE -->
<div id="detalle"></div>

<script>

// USUARIOS
const usuarios = {
  "luis": { pass: "1234", rol: "GERENTE" },
  "juan": { pass: "1234", rol: "VENDEDOR" },
  "katy": { pass: "1234", rol: "VENDEDORA" },
  "richar": { pass: "admin123", rol: "PROGRAMADOR" }
};

// DATA
const urlInv = "https://opensheet.elk.sh/197The7KApBX0G_p9PCTiAAWZ1oBMLDWQEZIeUDHgXpE/INVENTARIO";

let inventario = [];

// LOGIN
function login(){
  const u = usuario.value.toLowerCase();
  const p = password.value;

  if(usuarios[u] && usuarios[u].pass === p){
    localStorage.setItem("usuario", u);
    localStorage.setItem("rol", usuarios[u].rol);
    location.reload();
  } else {
    errorLogin.innerText="Datos incorrectos";
  }
}

// AUTO LOGIN
window.onload = ()=>{
  const u = localStorage.getItem("usuario");
  const r = localStorage.getItem("rol");

  if(u && r){
    login.style.display="none";
    barraUsuario.style.display="block";

    infoUser.innerHTML = `👤 <span class="rol">${r}</span> : <span class="user">${u.toUpperCase()}</span>`;
  }

  fetch(urlInv).then(r=>r.json()).then(d=>inventario=d);
}

// LOGOUT
function logout(){
  localStorage.clear();
  location.reload();
}

// ABRIR CATEGORIA
function abrir(cat){
  menu.style.display="none";
  productos.style.display="flex";

  let lista = inventario.filter(p=>p.categoria===cat);

  let html="";
  lista.forEach(p=>{
    html+=`
    <div class="card" onclick="verDetalle('${p.producto}')">
      <img src="${p.imagen}">
      <h3>${p.producto}</h3>
    </div>`;
  });

  productos.innerHTML=html;
}

// DETALLE
function verDetalle(nombre){
  productos.style.display="none";
  detalle.style.display="block";

  let items = inventario.filter(p=>p.producto===nombre);

  let html=`<h2>${nombre}</h2>
  <img src="${items[0].imagen}" style="width:100%;border-radius:10px;">`;

  html+=`<div class="tallas">`;

  items.forEach(p=>{
    html+=`
    <div class="talla-card">
      <h4>Talla ${p.talla}</h4>
      <p>Stock: ${p.stock}</p>
      <p>Unidad: S/${p.unidad}</p>
      <p>Docena: S/${p.docena}</p>
      <p>Caja: S/${p.cajon}</p>
      <p>Ciento: S/${p.ciento}</p>
      <button onclick="comprar('${p.producto}','${p.talla}')">Comprar</button>
    </div>`;
  });

  html+=`</div>
  <button class="back" onclick="volver()">⬅ Volver</button>`;

  detalle.innerHTML=html;
}

// VOLVER
function volver(){
  detalle.style.display="none";
  productos.style.display="flex";
}

// COMPRAR
function comprar(prod,talla){
  alert("Venta: "+prod+" - Talla "+talla);
}

</script>

</body>
</html>
